<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="folderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a80ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4edb"/>
      <stop offset="100%" stop-color="#5538b5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Folder - back tab -->
  <g filter="url(#shadow)">
    <path d="
      M 200 340
      L 200 290
      Q 200 260 230 260
      L 400 260
      Q 420 260 435 275
      L 475 315
      Q 490 330 510 330
      L 794 330
      Q 824 330 824 360
      L 824 340
      Z
    " fill="url(#folderGrad)" opacity="0.7"/>
  </g>

  <!-- Folder - main body -->
  <g filter="url(#shadow)">
    <path d="
      M 200 380
      L 200 290
      Q 200 260 230 260
      L 400 260
      Q 420 260 435 275
      L 475 315
      Q 490 330 510 330
      L 794 330
      Q 824 330 824 360
      L 824 720
      Q 824 750 794 750
      L 230 750
      Q 200 750 200 720
      Z
    " fill="url(#folderGrad)"/>
  </g>

  <!-- Folder - front face -->
  <path d="
    M 180 440
    Q 180 410 210 410
    L 814 410
    Q 844 410 844 440
    L 844 740
    Q 844 770 814 770
    L 210 770
    Q 180 770 180 740
    Z
  " fill="url(#folderFront)"/>

  <!-- Hammer handle -->
  <rect x="498" y="505" width="28" height="170" rx="7" fill="#c4a882" transform="rotate(-35, 512, 590)"/>

  <!-- Hammer head -->
  <g transform="rotate(-35, 512, 590)">
    <rect x="465" y="485" width="94" height="44" rx="9" fill="#e8e8f0"/>
    <rect x="465" y="485" width="94" height="22" rx="6" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>
