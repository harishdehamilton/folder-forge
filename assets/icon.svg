<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#222233"/>
      <stop offset="100%" stop-color="#1c1c27"/>
    </linearGradient>
    <linearGradient id="folderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a80ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4edb"/>
      <stop offset="100%" stop-color="#5538b5"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd580"/>
      <stop offset="100%" stop-color="#ffaa33"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background with rounded corners (macOS style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern for texture -->
  <g opacity="0.04">
    <line x1="256" y1="160" x2="256" y2="864" stroke="#fff" stroke-width="1"/>
    <line x1="512" y1="160" x2="512" y2="864" stroke="#fff" stroke-width="1"/>
    <line x1="768" y1="160" x2="768" y2="864" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="340" x2="864" y2="340" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="512" x2="864" y2="512" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="684" x2="864" y2="684" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Folder shape - back panel -->
  <g filter="url(#shadow)">
    <path d="
      M 200 340
      L 200 290
      Q 200 260 230 260
      L 400 260
      Q 420 260 435 275
      L 475 315
      Q 490 330 510 330
      L 794 330
      Q 824 330 824 360
      L 824 340
      Z
    " fill="url(#folderGrad)" opacity="0.7"/>
  </g>

  <!-- Folder shape - main body -->
  <g filter="url(#shadow)">
    <path d="
      M 200 380
      L 200 290
      Q 200 260 230 260
      L 400 260
      Q 420 260 435 275
      L 475 315
      Q 490 330 510 330
      L 794 330
      Q 824 330 824 360
      L 824 720
      Q 824 750 794 750
      L 230 750
      Q 200 750 200 720
      Z
    " fill="url(#folderGrad)"/>
  </g>

  <!-- Folder front face -->
  <path d="
    M 180 440
    Q 180 410 210 410
    L 814 410
    Q 844 410 844 440
    L 844 740
    Q 844 770 814 770
    L 210 770
    Q 180 770 180 740
    Z
  " fill="url(#folderFront)"/>

  <!-- Subtle folder line detail -->
  <line x1="210" y1="440" x2="814" y2="440" stroke="#7c5cff" stroke-width="2" opacity="0.5"/>

  <!-- Hammer / Anvil motif centered on folder -->
  <!-- Anvil base -->
  <path d="
    M 420 700
    L 604 700
    L 620 680
    Q 625 670 615 670
    L 409 670
    Q 399 670 404 680
    Z
  " fill="#3d3458" opacity="0.9"/>

  <!-- Hammer handle -->
  <rect x="490" y="470" width="24" height="160" rx="6" ry="6" fill="#8b7baa" transform="rotate(-35, 502, 550)"/>

  <!-- Hammer head -->
  <g transform="rotate(-35, 502, 550)">
    <rect x="460" y="450" width="84" height="40" rx="8" ry="8" fill="#b8a8d8"/>
    <rect x="460" y="450" width="84" height="40" rx="8" ry="8" fill="url(#folderGrad)" opacity="0.6"/>
    <!-- Hammer face highlight -->
    <rect x="462" y="453" width="30" height="14" rx="4" ry="4" fill="#c8b8ee" opacity="0.5"/>
  </g>

  <!-- Forge sparks -->
  <!-- Main spark burst point -->
  <g filter="url(#sparkGlow)">
    <!-- Spark 1 - large -->
    <circle cx="540" cy="580" r="5" fill="#ffd580"/>
    <circle cx="540" cy="580" r="3" fill="#fff"/>

    <!-- Spark 2 -->
    <circle cx="575" cy="555" r="4" fill="#ffaa33"/>
    <circle cx="575" cy="555" r="2" fill="#ffeedd"/>

    <!-- Spark 3 -->
    <circle cx="520" cy="555" r="3.5" fill="#ffd580"/>
    <circle cx="520" cy="555" r="1.8" fill="#fff"/>

    <!-- Spark 4 -->
    <circle cx="560" cy="540" r="3" fill="#ffaa33"/>
    <circle cx="560" cy="540" r="1.5" fill="#fff"/>

    <!-- Spark 5 - small -->
    <circle cx="590" cy="570" r="2.5" fill="#ffd580"/>

    <!-- Spark 6 -->
    <circle cx="550" cy="530" r="2" fill="#ffcc66"/>

    <!-- Spark 7 -->
    <circle cx="600" cy="545" r="2" fill="#ffd580"/>

    <!-- Spark trails -->
    <line x1="540" y1="580" x2="555" y2="560" stroke="#ffd580" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="540" y1="580" x2="575" y2="555" stroke="#ffaa33" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="540" y1="580" x2="520" y2="555" stroke="#ffd580" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="540" y1="580" x2="590" y2="570" stroke="#ffaa33" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Purple accent glow behind sparks -->
  <circle cx="545" cy="575" r="40" fill="#7c5cff" opacity="0.12"/>

  <!-- Template/structure lines on folder (representing folder templates) -->
  <g opacity="0.3" stroke="#b8a0ff" stroke-width="3" stroke-linecap="round">
    <line x1="250" y1="480" x2="350" y2="480"/>
    <line x1="250" y1="510" x2="320" y2="510"/>
    <line x1="250" y1="540" x2="290" y2="540"/>
  </g>

  <!-- Corner accent -->
  <circle cx="830" cy="200" r="60" fill="#7c5cff" opacity="0.06"/>
  <circle cx="830" cy="200" r="30" fill="#7c5cff" opacity="0.04"/>
</svg>